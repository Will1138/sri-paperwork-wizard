<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRI Pte Ltd - Transaction Paperwork Wizard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="module">
        import React from 'https://esm.sh/react@18';
        import ReactDOM from 'https://esm.sh/react-dom@18/client';

        // Sub-components defined OUTSIDE the main component to prevent
        // re-creation on every render (which causes inputs to lose focus)
        const CardButton = ({ selected, onClick, children, className = '' }) =>
            React.createElement('button', {
                onClick,
                className: `p-6 rounded-lg border-2 transition-all text-left ${selected ? 'border-purple-600 bg-purple-50' : 'border-gray-300 bg-white hover:border-purple-400'} ${className}`
            }, children);

        const FormSection = ({ title, children }) =>
            React.createElement('div', { className: 'mb-8' },
                React.createElement('h3', { className: 'text-lg font-semibold mb-4', style: { color: '#5B2D8E' } }, title),
                React.createElement('div', { className: 'space-y-4' }, children)
            );

        const InputField = ({ label, value, onChange, type = 'text', required = false, ...props }) =>
            React.createElement('div', null,
                React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-2' },
                    label,
                    required && React.createElement('span', { className: 'text-red-500' }, '*')
                ),
                React.createElement('input', {
                    type,
                    value,
                    onChange: (e) => onChange(e.target.value),
                    className: `w-full px-4 py-2 border rounded-lg focus:ring-2 focus:outline-none ${required && !value ? 'border-red-500 focus:ring-red-500' : 'border-gray-300 focus:ring-purple-500'}`,
                    ...props
                })
            );

        const SelectField = ({ label, value, onChange, options, required = false }) =>
            React.createElement('div', null,
                React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-2' },
                    label,
                    required && React.createElement('span', { className: 'text-red-500' }, '*')
                ),
                React.createElement('select', {
                    value,
                    onChange: (e) => onChange(e.target.value),
                    className: `w-full px-4 py-2 border rounded-lg focus:ring-2 focus:outline-none ${required && !value ? 'border-red-500 focus:ring-red-500' : 'border-gray-300 focus:ring-purple-500'}`
                },
                    React.createElement('option', { value: '' }, 'Select...'),
                    options.map((opt) =>
                        React.createElement('option', { key: opt.value, value: opt.value }, opt.label)
                    )
                )
            );

        const CheckboxField = ({ label, checked, onChange }) =>
            React.createElement('div', { className: 'flex items-center' },
                React.createElement('input', {
                    type: 'checkbox',
                    checked,
                    onChange: (e) => onChange(e.target.checked),
                    className: 'w-5 h-5 rounded text-purple-600 focus:ring-2 focus:ring-purple-500'
                }),
                React.createElement('label', { className: 'ml-3 text-sm text-gray-700' }, label)
            );

        const ProgressBar = ({ step, transactionType }) => {
            const totalSteps = transactionType === 'RoomRental' ? 4 : 5;
            const currentStep = transactionType === 'RoomRental' && step > 2 ? step - 1 : step;
            const progress = (currentStep / totalSteps) * 100;

            return React.createElement('div', { className: 'mb-8' },
                React.createElement('div', { className: 'flex justify-between items-center mb-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold', style: { color: '#5B2D8E' } }, 'SRI Paperwork Wizard'),
                    React.createElement('span', { className: 'text-gray-600 text-sm' }, `Step ${currentStep} of ${totalSteps}`)
                ),
                React.createElement('div', { className: 'w-full bg-gray-200 rounded-full h-2' },
                    React.createElement('div', {
                        className: 'h-2 rounded-full transition-all duration-300',
                        style: { width: `${progress}%`, backgroundColor: '#F5A623' }
                    })
                )
            );
        };

        // Main app component
        const SRIPaperworkApp = () => {
            const [step, setStep] = React.useState(1);
            const [formData, setFormData] = React.useReducer(
                (state, action) => {
                    switch (action.type) {
                        case 'SET_FIELD':
                            return { ...state, [action.field]: action.value };
                        case 'RESET':
                            return {};
                        default:
                            return state;
                    }
                },
                {
                    transactionType: null,
                    propertyType: null,
                    role: null,
                    agencyType: null,
                    cobroke: null,
                    selectedForms: {},
                    thresholdExceeded: false,
                    agentName: '',
                    ceaRegistration: '',
                    agentContact: '',
                    clientName: '',
                    clientNRIC: '',
                    clientAddress: '',
                    clientContact: '',
                    clientNationality: '',
                    clientDOB: '',
                    clientOccupation: '',
                    clientSourceOfFunds: '',
                    clientPEP: false,
                    clientActingOnBehalf: false,
                    propertyAddress: '',
                    floorArea: '',
                    transactionPrice: '',
                    commissionRate: '',
                    commissionGST: false,
                    leaseStartDate: '',
                    leaseEndDate: '',
                    securityDeposit: '',
                    exclusiveStartDate: '',
                    exclusiveEndDate: '',
                    counterpartyName: '',
                    counterpartyNRIC: '',
                    counterpartyAddress: '',
                    counterpartyContact: '',
                    cobrokeAgentName: '',
                    cobrokeAgentCEA: '',
                    cobrokeAgentMobile: '',
                    cobrokeAgentAgency: '',
                }
            );

            const updateField = (field, value) => {
                setFormData({ type: 'SET_FIELD', field, value });
            };

            const updateForm = (formName, checked) => {
                setFormData({
                    type: 'SET_FIELD',
                    field: 'selectedForms',
                    value: { ...formData.selectedForms, [formName]: checked }
                });
            };

            const getRequiredForms = () => {
                const forms = { mustSign: [], transaction: [], amlkyc: [], special: [] };

                if (!formData.transactionType || !formData.propertyType || !formData.role) {
                    return forms;
                }

                if (formData.transactionType === 'RoomRental') {
                    forms.transaction.push({ id: 'roomRental', name: 'Room Rental Agreement' });
                    return forms;
                }

                const isExclusive = formData.agencyType === 'Exclusive';
                const isProp = formData.propertyType === 'Private' || formData.propertyType === 'HDB';

                if (isProp) {
                    if (formData.role === 'Seller/Landlord' && formData.transactionType !== 'Rental') {
                        forms.mustSign.push({ id: isExclusive ? 'Form5' : 'Form1', name: isExclusive ? 'Exclusive Agency Agreement (Seller)' : 'Non-Exclusive Agency Agreement (Seller)' });
                    } else if (formData.role === 'Buyer/Tenant' && formData.transactionType !== 'Rental') {
                        forms.mustSign.push({ id: isExclusive ? 'Form6' : 'Form2', name: isExclusive ? 'Exclusive Agency Agreement (Buyer)' : 'Non-Exclusive Agency Agreement (Buyer)' });
                    } else if (formData.role === 'Seller/Landlord' && formData.transactionType === 'Rental') {
                        forms.mustSign.push({ id: isExclusive ? 'Form7' : 'Form3', name: isExclusive ? 'Exclusive Agency Agreement (Landlord)' : 'Non-Exclusive Agency Agreement (Landlord)' });
                    } else if (formData.role === 'Buyer/Tenant' && formData.transactionType === 'Rental') {
                        forms.mustSign.push({ id: isExclusive ? 'Form8' : 'Form4', name: isExclusive ? 'Exclusive Agency Agreement (Tenant)' : 'Non-Exclusive Agency Agreement (Tenant)' });
                    }
                } else {
                    const commMap = {
                        'Seller/Landlord': 'CommSeller',
                        'Buyer/Tenant': 'CommBuyer'
                    };
                    forms.mustSign.push({ id: commMap[formData.role], name: 'Exclusive Agency Agreement (Commercial)' });
                }

                if (formData.transactionType === 'Sale' || formData.transactionType === 'Purchase') {
                    const hdbSuffix = formData.propertyType === 'HDB' ? '_hdb' : '';
                    const roleKey = formData.role === 'Seller/Landlord' ? 'seller' : 'buyer';
                    const roleLabel = formData.role === 'Seller/Landlord' ? 'Seller' : 'Buyer';
                    forms.mustSign.push({
                        id: `commission_${roleKey}${hdbSuffix}`,
                        name: `Commission Agreement (${roleLabel}${hdbSuffix ? ' - HDB' : ''})`
                    });
                } else if (formData.transactionType === 'Rental') {
                    forms.mustSign.push({
                        id: `commission_${formData.role === 'Seller/Landlord' ? 'landlord' : 'tenant'}`,
                        name: `Commission Agreement (${formData.role === 'Seller/Landlord' ? 'Landlord' : 'Tenant'})`
                    });
                }

                if (formData.cobroke === 'Cobroke') {
                    const cobrokeRole = formData.role === 'Seller/Landlord'
                        ? (formData.transactionType === 'Rental' ? 'landlord' : 'seller')
                        : (formData.transactionType === 'Rental' ? 'tenant' : 'buyer');
                    forms.mustSign.push({
                        id: `cobroke_${cobrokeRole}`,
                        name: `Co-Broke Agreement (SRI Representing ${cobrokeRole.charAt(0).toUpperCase() + cobrokeRole.slice(1)})`
                    });
                }

                forms.amlkyc.push(
                    { id: 'formA1', name: 'Form A1 (Client - Individual)' },
                    { id: 'formA2', name: 'Form A2 (Client - Entity)' },
                    { id: 'formB', name: 'Form B (Client)' }
                );

                if (formData.cobroke === 'Solo') {
                    forms.amlkyc.push(
                        { id: 'formU1', name: 'Form U1 (Counterparty - Individual)' },
                        { id: 'formU5', name: 'Form U5 (Counterparty)' }
                    );
                }

                if (formData.transactionType === 'Sale' || formData.transactionType === 'Purchase') {
                    forms.transaction.push({ id: 'otp', name: 'Offer to Purchase (OTP)' });
                } else if (formData.transactionType === 'Rental') {
                    forms.transaction.push(
                        { id: 'loi', name: 'Letter of Intent (LOI)' },
                        { id: 'tenancyAgreement', name: 'Tenancy Agreement' }
                    );
                }

                if (formData.transactionType === 'Rental' && (formData.propertyType === 'HDB' || formData.propertyType === 'Private')) {
                    forms.special.push({ id: 'womensCharter', name: "Women's Charter Checklist" });
                }

                if (formData.thresholdExceeded && (formData.transactionType === 'Sale' || formData.transactionType === 'Purchase')) {
                    forms.special.push({ id: 'salespersonDeclaration', name: 'Salesperson Declaration (≥S$3M)' });
                }

                return forms;
            };

            const requiredForms = getRequiredForms();
            const allForms = [
                ...requiredForms.mustSign,
                ...requiredForms.transaction,
                ...requiredForms.amlkyc,
                ...requiredForms.special
            ];

            const validateStep = () => {
                if (step === 1) {
                    return formData.transactionType && formData.propertyType && formData.role;
                }
                if (step === 2) {
                    if (formData.transactionType === 'RoomRental') return true;
                    return formData.agencyType && formData.cobroke;
                }
                if (step === 3) {
                    return Object.values(formData.selectedForms).some(v => v === true);
                }
                if (step === 4) {
                    return (
                        formData.agentName &&
                        formData.ceaRegistration &&
                        formData.agentContact &&
                        formData.clientName &&
                        formData.clientNRIC &&
                        formData.clientAddress &&
                        formData.propertyAddress &&
                        formData.transactionPrice
                    );
                }
                return true;
            };

            const handleNext = () => {
                if (validateStep()) {
                    if (formData.transactionType === 'RoomRental' && step === 1) {
                        setStep(3);
                    } else {
                        setStep(step + 1);
                    }
                }
            };

            const handleBack = () => {
                if (formData.transactionType === 'RoomRental' && step === 3) {
                    setStep(1);
                } else {
                    setStep(step - 1);
                }
            };

            const [generating, setGenerating] = React.useState(false);
            const [genStatus, setGenStatus] = React.useState('');

            // Map form IDs to actual template filenames in the "realtor forms/" folder
            const templateMap = {
                // Agency Agreements (Forms 1-8) - .docx
                'Form1': '(Form 1) Estate Agency Agreement for the Sale of Residential Property.docx',
                'Form2': '(Form 2) Estate Agency Agreement for the Purchase of Residential Property.docx',
                'Form3': '(Form 3) Estate Agency Agreement for the Lease of Residential Property by a Landlord.docx',
                'Form4': '(Form 4) Estate Agency Agreement for the Lease of Residential Property by a Tenant.docx',
                'Form5': '(Form 5) Exclusive Estate Agency Agreement for the Sale of Residential Property.docx',
                'Form6': '(Form 6) Exclusive Estate Agency Agreement for the Purchase of Residential Property.docx',
                'Form7': '(Form 7) Exclusive Estate Agency Agreement for the Lease of Residential Property by a Landlord.docx',
                'Form8': '(Form 8) Exclusive Estate Agency Agreement for the Lease of Residential Property by a Tenant.docx',
                // Commission Agreements - .docx
                'commission_seller': 'Commission Agreement - Seller.docx',
                'commission_buyer': 'Commission Agreement - Buyer.docx',
                'commission_landlord': 'Commission Agreement - Landlord.docx',
                'commission_tenant': 'Commission Agreement - Tenant.docx',
                'commission_seller_hdb': 'Commission Agreement - Seller (HDB).docx',
                'commission_buyer_hdb': 'Commission Agreement - Buyer (HDB).docx',
                // Commercial Agency - .docx
                'CommSeller': 'Exclusive Commercial & Industrial Agreement (Representing Seller).docx',
                'CommBuyer': 'Exclusive Commercial & Industrial Agreement (Representing Buyer).docx',
                'CommLandlord': 'Exclusive Commercial & Industrial Agreement (Representing Landlord).docx',
                'CommTenant': 'Exclusive Commercial & Industrial Agreement (Representing Tenant).docx',
                // Cobroke - .docx
                'cobroke_seller': 'Cobroke Agreement - SRI Representing Seller.docx',
                'cobroke_buyer': 'Cobroke Agreement - SRI Representing Buyer.docx',
                'cobroke_landlord': 'Cobroke Agreement - SRI Representing Landlord.docx',
                'cobroke_tenant': 'Cobroke Agreement - SRI Representing Tenant.docx',
                // Transaction docs - .docx and .doc
                'otp': 'PTE RESIDENTIAL Option To Purchase.docx',
                'offerToPurchase': 'PTE RESIDENTIAL Offer to Purchase.doc',
                'loi_landlord': 'PTE RESIDENTIAL Letter of Intent (Representing Landlord).docx',
                'loi_tenant': 'PTE RESIDENTIAL Letter of Intent (Representing Tenant).docx',
                'letterOfOffer': 'PTE RESIDENTIAL Letter of Offer (Representing Landlord)-2.docx',
                'tenancyAgreement': 'PTE RESIDENTIAL Tenancy Agreement.doc',
                'tenancyAgreement_hdb': 'Tenancy Agreement (HDB).docx',
                'tenancyAgreement_ci': 'Tenancy Agreement (Industrial & Commercial).doc',
                'tenancyAgreement_ci_fror': 'Tenancy Agreement (Industrial & Commercial - First Right of Refusal).doc',
                'otp_hdb': 'Option to Purchase (Commercial) - HDB.docx',
                'otp_ci': 'INDUSTRIAL & COMMERCIAL Option to Purchase.docx',
                'otp_ci_jtc': 'INDUSTRIAL & COMMERCIAL Option to Purchase (JTC).docx',
                'offerToPurchase_ci': 'INDUSTRIAL & COMMERCIAL Offer to Purchase.doc',
                'loi_ci': 'INDUSTRIAL & COMMERCIAL Letter of Intent.doc',
                'roomRental': 'Room Rental Agreement.doc',
                // AML/KYC - PDF only
                'formA1': 'Form A1.pdf',
                'formA2': 'Form A2.pdf',
                'formA3': 'Form A3.pdf',
                'formA4': 'Form A4.pdf',
                'formB': 'Form B.pdf',
                'formC': 'Form C.pdf',
                'formD': 'Form D.pdf',
                'formU1': 'Form U1.pdf',
                'formU2': 'Form U2.pdf',
                'formU3': 'Form U3.pdf',
                'formU4': 'Form U4.pdf',
                'formU5': 'Form U5.pdf',
                'formU6': 'Form U6.pdf',
                // Special
                'salespersonDeclaration': 'Salesperson Declaration (Sales Transaction $3M and Above)_1627816026.pdf',
                'womensCharter': "Women's Charter Checklist for Lease of Residential Properties.pdf",
                'internalMutual': 'Internal Mutual Agreement.docx',
                'commissionSharing': 'SRI Commission Sharing Agreement.docx',
            };

            // Fetch a template file from the co-hosted "realtor forms" folder
            const fetchTemplate = async (filename) => {
                const url = `./Realtor Forms/${encodeURIComponent(filename)}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`Could not load template: ${filename} (${resp.status})`);
                return await resp.arrayBuffer();
            };

            // Fill a .docx template by replacing underscore blanks in the XML
            // Templates use patterns like "Date : ___________" or "Name : ___________"
            // We find underscore runs in <w:t> elements and replace based on context
            // Convert a number to words (e.g., 2500000 → "Two Million Five Hundred Thousand")
            const numberToWords = (num) => {
                if (num === 0) return 'Zero';
                const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
                    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
                const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
                const scales = ['','Thousand','Million','Billion'];
                const toWords = (n) => {
                    if (n === 0) return '';
                    if (n < 20) return ones[n];
                    if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                    return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' ' + toWords(n % 100) : '');
                };
                const n = Math.abs(Math.floor(parseFloat(String(num).replace(/,/g, '')) || 0));
                if (n === 0) return 'Zero';
                const parts = [];
                let remaining = n;
                for (let i = 0; remaining > 0; i++) {
                    const chunk = remaining % 1000;
                    if (chunk > 0) parts.unshift(toWords(chunk) + (scales[i] ? ' ' + scales[i] : ''));
                    remaining = Math.floor(remaining / 1000);
                }
                return parts.join(' ');
            };

            // Format number with commas (e.g., 2500000 → "2,500,000")
            const formatPrice = (val) => {
                const n = parseFloat(String(val).replace(/,/g, '')) || 0;
                return n.toLocaleString('en-US');
            };

            const fillDocxTemplate = (arrayBuffer) => {
                console.log('[FILL] Starting fillDocxTemplate, buffer size:', arrayBuffer.byteLength);
                const zip = new PizZip(arrayBuffer);
                const xmlFile = zip.file('word/document.xml');
                if (!xmlFile) { console.warn('[FILL] No word/document.xml found!'); return zip; }

                let xml = xmlFile.asText();
                console.log('[FILL] XML length:', xml.length);
                const today = new Date().toLocaleDateString('en-SG');
                const priceInWords = numberToWords(formData.transactionPrice);
                const priceFormatted = formatPrice(formData.transactionPrice);
                const roleLabel = formData.role === 'Seller/Landlord'
                    ? (formData.transactionType === 'Rental' ? 'Landlord' : 'Seller')
                    : (formData.transactionType === 'Rental' ? 'Tenant' : 'Buyer');

                // Step 1: Extract all text content to build context for matching
                // We concatenate text from <w:t> tags to understand the document flow
                const textParts = [];
                const regex = /<w:t(?:\s[^>]*)?>([^<]*)<\/w:t>/g;
                let m;
                while ((m = regex.exec(xml)) !== null) {
                    textParts.push({ text: m[1], index: m.index, fullMatch: m[0], captureStart: m.index + m[0].indexOf(m[1]) });
                }

                // Step 2: Build a flat text string and track positions back to XML
                let flatText = '';
                const posMap = []; // maps flat text position → textParts index
                for (let i = 0; i < textParts.length; i++) {
                    const start = flatText.length;
                    flatText += textParts[i].text;
                    for (let j = 0; j < textParts[i].text.length; j++) {
                        posMap.push(i);
                    }
                }

                // Step 3: Define context-based replacement rules
                // Each rule: regex to find in the flat text, capture group 1 = underscores to replace
                // Rules are applied in order; each rule matches at most once.
                // For CEA forms (Forms 1-8), fields look like "Seller (1) Name: ___"
                // For Commission Agreements, fields look like "Name : ___________________"
                const replacements = [
                    // === DATE FIELDS ===
                    { pattern: /Date\s*:?\s*(_{3,})/, value: today },
                    { pattern: /dated this\s*(_{3,})/, value: today },
                    { pattern: /Agreement Date\/(_{3,})/, value: today },

                    // === AGENT / SALESPERSON ===
                    { pattern: /Salesperson[\s\S]{0,30}?Name\s*:?\s*(_{3,})/, value: formData.agentName },
                    { pattern: /CEA Reg\.?\s*No\.?\s*:?\s*(_{3,})/, value: formData.ceaRegistration },
                    { pattern: /Registration No\.?\s*:?\s*(_{3,})/, value: formData.ceaRegistration },
                    // Cobroke agreement: first "Name: ___" after "representing Seller/Buyer(s)"
                    { pattern: /representing\s+(?:Seller|Buyer|Landlord|Tenant)\(s\)Name\s*:\s*(_{3,})/, value: formData.agentName },
                    // Cobroke: first "CEA No.: ___" (before the second one)
                    { pattern: /CEA No\.\s*:\s*(_{3,})\s*CEA No\./, value: formData.ceaRegistration },
                    // Cobroke: first "Mobile: ___" (before the second one)
                    { pattern: /Mobile\s*:\s*(_{3,})\s*Mobile/, value: formData.agentContact },

                    // === CLIENT NAME ===
                    // Commission Agreement style: "To : ___ (Billing Name)"
                    { pattern: /To\s*:?\s*(_{3,})[\s\S]{0,20}?\(?Billing Name\)?/, value: formData.clientName },
                    // CEA form style: "Seller (1) Name: ___" or "Buyer (1) Name: ___"
                    { pattern: /(?:Seller|Buyer|Landlord|Tenant)\s*\(1\)\s*Name\s*:?\s*(_{3,})/, value: formData.clientName },
                    // Generic "I/We" pattern
                    { pattern: /I\/We,?\s*(_{3,})/, value: formData.clientName },

                    // === CLIENT ADDRESS ===
                    // Commission Agreement: after (Billing Name) line
                    { pattern: /\(Billing Name\)[\s\S]{0,5}?(_{3,})[\s\S]{0,20}?\(?Billing Address\)?/, value: formData.clientAddress },
                    // CEA form: "Address: ___" right after NRIC line
                    { pattern: /NRIC\s*No\.?\s*\(\d\)\s*:[\s\S]{0,30}?Address\s*:?\s*(_{3,})/, value: formData.clientAddress },

                    // === PROPERTY ADDRESS ===
                    // Commission Agreement style
                    { pattern: /Property Address\s*:?\s*(_{3,})/, value: formData.propertyAddress },
                    // CEA form style: "basis(7)(8):___"
                    { pattern: /basis[\s\S]{0,15}:\s*(_{3,})/, value: formData.propertyAddress },

                    // === PRICE / AMOUNT ===
                    { pattern: /\(\$\s*(_{3,})\)/, value: formData.transactionPrice ? priceFormatted : '' },
                    { pattern: /\(S\$\s*(_{3,})\s*\)/, value: formData.transactionPrice ? priceFormatted : '' },
                    { pattern: /Singapore Dollars\s*(_{3,})/, value: formData.transactionPrice ? priceInWords : '' },
                    { pattern: /sale price[\s\S]{0,30}?Singapore Dollars\s*(_{3,})/, value: formData.transactionPrice ? priceInWords : '' },
                    { pattern: /Monthly Rent\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Purchase Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Option Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Sale Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },

                    // === COMMISSION ===
                    { pattern: /commission\s+of\s+\*?S\$(_{3,})/, value: formData.commissionRate || '' },
                    { pattern: /commission\s+of\s+Singapore\s+Dollars\s*(_{3,})/, value: formData.commissionRate || '' },
                    { pattern: /rate\s+of\s+(_{3,})%/, value: formData.commissionRate || '' },
                    { pattern: /commission\s*:?\s*(_{3,})/, value: formData.commissionRate || '' },

                    // === NRIC ===
                    // CEA form style with footnote: "NRIC No.(4): ___"
                    { pattern: /NRIC\s*No\.?\s*\(\d\)\s*:?\s*(_{3,})/, value: formData.clientNRIC },
                    // Commission Agreement style
                    { pattern: /NRIC\s*(?:No\.?)?\s*:?\s*(_{3,})/, value: formData.clientNRIC },

                        for (let i = 0; i < startPartIdx; i++) charsBefore += textParts[i].text.length;
                        const inPartStart = underscoreStart - charsBefore;
                        const inPartEnd = underscoreEnd - charsBefore;
                        xmlReplacements.push({ partIndex: startPartIdx, inPartStart, inPartEnd, value: rule.value });
                        claimedParts.add(startPartIdx);
                    } else {
                        // Underscores span multiple <w:t> elements
                        // Replace first part's underscores with value, clear rest
                        let charsBefore = 0;
                        for (let i = 0; i < startPartIdx; i++) charsBefore += textParts[i].text.length;
                        const inPartStart = underscoreStart - charsBefore;
                        xmlReplacements.push({
                            partIndex: startPartIdx,
                            inPartStart,
                            inPartEnd: textParts[startPartIdx].text.length,
                            value: rule.value
                        });
                        // Clear intermediate parts
                        for (let i = startPartIdx + 1; i <= endPartIdx; i++) {
                            let cBefore = 0;
                            for (let j = 0; j < i; j++) cBefore += textParts[j].text.length;

                    const rawSuffix = part.text.substring(rep.inPartEnd);

                        const newTag = `<w:t xml:space="preserve">${prefix}</w:t></w:r>` +
