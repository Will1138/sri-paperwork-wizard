    <!-- pdf-lib with fallback CDN loading -->
    <script>
        window.pdfLibLoadError = null;
        function loadPdfLib() {
            const cdns = [
                'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js',
                'https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js',
                'https://esm.sh/pdf-lib@1.17.1'
            ];
            let currentCdnIndex = 0;

            function tryNextCdn() {
                if (currentCdnIndex >= cdns.length) {
                    window.pdfLibLoadError = 'All CDNs failed to load pdf-lib';
                    console.error('[PDF-LIB] Failed to load from all CDNs');
                    return;
                }

                const cdn = cdns[currentCdnIndex];
                console.log('[PDF-LIB] Trying CDN:', cdn);

                const script = document.createElement('script');
                script.src = cdn;
                script.onload = function() {
                    console.log('[PDF-LIB] Successfully loaded from:', cdn);
                };
                script.onerror = function() {
                    console.warn('[PDF-LIB] Failed to load from:', cdn);
                    currentCdnIndex++;
                    tryNextCdn();
                };
                document.head.appendChild(script);
            }

            tryNextCdn();
        }
        loadPdfLib();
    </script>

        const CheckboxField = ({ label, checked, onChange }) =>

        // Auto-save draft storage. We use sessionStorage (NOT localStorage) so the
        // draft only survives page refreshes within the same tab and disappears
        // automatically when the tab is closed. Data never leaves the user's
        // device — see the privacy banner in Step 1.
        const DRAFT_STORAGE_KEY = 'sri-paperwork-wizard-draft-v1';

        const ProgressBar = ({ step, transactionType, onClear }) => {
            // Non-RoomRental: 6 steps (Deal -> Structure -> Forms -> Details -> AML -> Review)
            // RoomRental: 4 steps (Deal -> Forms -> Details -> Review), skipping Structure(2) and AML(5)
            const totalSteps = transactionType === 'RoomRental' ? 4 : 6;
            let currentStep = step;
            if (transactionType === 'RoomRental') {
                // step sequence for RR is 1, 3, 4, 6 -> display as 1, 2, 3, 4
                if (step === 3) currentStep = 2;
                else if (step === 4) currentStep = 3;
                else if (step === 6) currentStep = 4;
            }
            const progress = (currentStep / totalSteps) * 100;

            return React.createElement('div', { className: 'mb-8' },
                React.createElement('div', { className: 'flex justify-between items-center mb-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold', style: { color: '#5B2D8E' } }, 'SRI Paperwork Wizard'),
                    React.createElement('div', { className: 'flex items-center gap-4' },
                        onClear && React.createElement('button', {
                            type: 'button',
                            onClick: onClear,
                            className: 'text-xs text-gray-500 hover:text-red-600 underline',
                            title: 'Wipe all entered data and start fresh'
                        }, 'Clear all data'),
                        React.createElement('span', { className: 'text-gray-600 text-sm' }, `Step ${currentStep} of ${totalSteps}`)
                    )
                ),
                React.createElement('div', { className: 'w-full bg-gray-200 rounded-full h-2' },
                    React.createElement('div', {
                        className: 'h-2 rounded-full transition-all duration-300',
                        style: { width: `${progress}%`, backgroundColor: '#F5A623' }
                    })
                )
            );
        };

        // Main app component

            const [formData, setFormData] = React.useReducer(

                    switch (action.type) {
                        case 'SET_FIELD':
                            return { ...state, [action.field]: action.value };
                        case 'RESET':
                            return {};
                        default:
                            return state;

                {
                    transactionType: null,
                    propertyType: null,
                    role: null,
                    agencyType: null,
                    cobroke: null,
                    // CDD Form Selection Fields

                    numberOfBeneficialOwners: '1',
                    clientActingOnBehalf: false,
                    counterpartyType: null, // "Individual" or "Entity" (only if Solo)
                    counterpartyActingOnBehalf: false,
                    counterpartyPrincipalType: '',  // 'Individual' or 'Entity' — drives U3 vs U4
                    generateFormD: false,            // Manual trigger: opt in for ongoing review
                    selectedForms: {},
                    thresholdExceeded: false,

                    ceaRegistration: '',
                    agentContact: '',
                    clientName: '',
                    clientNRIC: '',
                    clientAddress: '',
                    clientContact: '',
                    clientNationality: '',
                    clientDOB: '',
                    clientOccupation: '',
                    clientSourceOfFunds: '',
                    clientPEP: false,

                    floorArea: '',

                    leaseStartDate: '',
                    leaseEndDate: '',

                    counterpartyAddress: '',

                    // Property category for AML form checkbox row (HDB / Condo / Landed / Others).

                    // Individual client extras (A1)

                    // Entity client (A2) — only used when clientType === 'Entity'

                    // Beneficial Owner 1 (A2 page 2 / A4)
                    bo1Name: '',

                    // Principal on whose behalf client is acting (A3)

                    // Women's Charter Checklist — fill only the sections William confirms.

                    //   'Foreigner' → rows 4-6 only
                    //   'Mixed'     → all 6 rows
                    //   ''          → none (form stays blank, user fills manually)
                    wcAllChecksDone: false,

                    // --- Others-specify reveal text fields (shown only when ID/type === 'Others') ---
                    entityTypeOthersDetail: '',
                    entityP1IdOthersDetail: '',
                    entityP2IdOthersDetail: '',
                    bo1IdOthersDetail: '',
                    bo2IdOthersDetail: '',
                    principalIdOthersDetail: '',
                    counterpartyIdOthersDetail: '',
                    counterpartyPropertyOthersDetail: '',

                    // --- Form B screening exceptions (default: all No, no risk reason) ---
                    // Tap-to-flag pattern: showExceptions stays false for clean deals;

                    formB: {
                        showExceptions: false,
                        s1: ['No','No','No','No','No','No'],

                        riskReason: ''
                    },

                    // Form U5 (counterparty risk screening) — same shape as formB
                    formU5: {
                        showExceptions: false,

                    // --- Counterparty Principal (Form U3) — person counterparty acts on behalf of ---
                    counterpartyPrincipalName: '',
                    counterpartyPrincipalNric: '',
                    counterpartyPrincipalDob: '',
                    counterpartyPrincipalAddress: '',
                    counterpartyPrincipalNationality: '',
                    counterpartyPrincipalOccupation: '',
                    counterpartyPrincipalIdType: 'NRIC',
                    counterpartyPrincipalIdOthersDetail: '',
                    counterpartyPrincipalAuthorised: 'Yes',

                    // --- Counterparty Entity (Form U2) — when counterparty is an entity ---
                    counterpartyEntityName: '',
                    counterpartyEntityUen: '',
                    counterpartyEntityDateOfIncorp: '',
                    counterpartyEntityCountry: 'Singapore',
                    counterpartyEntityAddress: '',
                    counterpartyEntityPrincipalAddress: '',
                    counterpartyEntityPhone: '',
                    counterpartyEntityEmail: '',
                    counterpartyEntityMainBusiness: '',
                    counterpartyEntityType: 'Company',
                    counterpartyEntityTypeOthersDetail: '',
                    counterpartyEntityAuthorised: true,
                    counterpartyEntitySeniorMgmtIsBO: false,
                    counterpartyEntityP1Designation: '',
                    counterpartyEntityP1Name: '',
                    counterpartyEntityP1Nric: '',
                    counterpartyEntityP1Nationality: '',
                    counterpartyEntityP1IdType: 'NRIC',
                    counterpartyEntityP1IdOthersDetail: '',
                    counterpartyEntityP2Designation: '',
                    counterpartyEntityP2Name: '',
                    counterpartyEntityP2Nric: '',
                    counterpartyEntityP2Nationality: '',
                    counterpartyEntityP2IdType: 'NRIC',
                    counterpartyEntityP2IdOthersDetail: '',

                    // --- Counterparty Beneficial Owners 1 & 2 (Form U2 page 2) ---
                    counterpartyBo1Name: '',
                    counterpartyBo1Nric: '',
                    counterpartyBo1Dob: '',
                    counterpartyBo1Address: '',
                    counterpartyBo1Nationality: '',
                    counterpartyBo1Occupation: '',
                    counterpartyBo1IdType: 'NRIC',
                    counterpartyBo1IdOthersDetail: '',
                    counterpartyBo2Name: '',
                    counterpartyBo2Nric: '',
                    counterpartyBo2Dob: '',
                    counterpartyBo2Address: '',
                    counterpartyBo2Nationality: '',
                    counterpartyBo2Occupation: '',
                    counterpartyBo2IdType: 'NRIC',
                    counterpartyBo2IdOthersDetail: '',

                    // --- Form C / U6 (ECDD) — same shape, two instances ---
                    formC: {
                        purpose: '', purposeOthersDetail: '',
                        purchasePrice: '', monthlyRental: '', transactionAmount: '',
                        bankStatementMonths: '',
                        fundSources: [], fundSourcesOthersDetail: '',
                        fundLoanInstitution: '',
                        fundSupportingDocs: [], fundSupportingDocsOthersDetail: '',
                        wealthNetWorth: '',
                        wealthSources: [], wealthSourcesOthersDetail: '',
                        wealthBusinessName: '', wealthInvestmentType: '',
                        wealthSupportingDocs: [], wealthSupportingDocsOthersDetail: '',
                        recommendation: 'Proceed',
                        highRiskBasis: '', proceedReasons: ''
                    },
                    formU6: {
                        purpose: '', purposeOthersDetail: '',
                        purchasePrice: '', monthlyRental: '', transactionAmount: '',
                        bankStatementMonths: '',
                        fundSources: [], fundSourcesOthersDetail: '',
                        fundLoanInstitution: '',
                        fundSupportingDocs: [], fundSupportingDocsOthersDetail: '',
                        wealthNetWorth: '',
                        wealthSources: [], wealthSourcesOthersDetail: '',
                        wealthBusinessName: '', wealthInvestmentType: '',
                        wealthSupportingDocs: [], wealthSupportingDocsOthersDetail: '',
                        recommendation: 'Proceed',
                        highRiskBasis: '', proceedReasons: ''
                    },

                    // --- Form D (Ongoing DD) ---
                    formD: {
                        individualBOs: '', entityBOs: '',
                        relationshipNature: '', relationshipDate: '', transactionFrequency: '',
                        reviewFrequency: '', lastReviewDate: '', nextReviewDue: '',
                        riskLevelReasons: '',
                        docsCurrent: 'Yes',
                        changedDetails: [], changeOthersDetail: '',
                        copyObtained: false,
                        transactionsConsistent: 'Yes',
                        unusualPatterns: '', actionsTaken: ''
                    },

                    // --- Counterparty Principal Entity (Form U4) ---
                    counterpartyPrincipalEntityName: '',
                    counterpartyPrincipalEntityUen: '',
                    counterpartyPrincipalEntityDateOfIncorp: '',
                    counterpartyPrincipalEntityCountry: 'Singapore',
                    counterpartyPrincipalEntityAddress: '',
                    counterpartyPrincipalEntityPrincipalAddress: '',
                    counterpartyPrincipalEntityPhone: '',
                    counterpartyPrincipalEntityEmail: '',
                    counterpartyPrincipalEntityMainBusiness: '',
                    counterpartyPrincipalEntityType: 'Company',
                    counterpartyPrincipalEntityTypeOthersDetail: '',
                    counterpartyPrincipalEntityAuthorised: true,
                    counterpartyPrincipalEntityP1Designation: '',
                    counterpartyPrincipalEntityP1Name: '',
                    counterpartyPrincipalEntityP1Nric: '',
                    counterpartyPrincipalEntityP1Nationality: '',
                    counterpartyPrincipalEntityP1IdType: 'NRIC',
                    counterpartyPrincipalEntityP1IdOthersDetail: '',
                    counterpartyPrincipalEntityP2Designation: '',
                    counterpartyPrincipalEntityP2Name: '',
                    counterpartyPrincipalEntityP2Nric: '',
                    counterpartyPrincipalEntityP2Nationality: '',
                    counterpartyPrincipalEntityP2IdType: 'NRIC',
                    counterpartyPrincipalEntityP2IdOthersDetail: '',
                    counterpartyPrincipalEntityP3Designation: '',
                    counterpartyPrincipalEntityP3Name: '',
                    counterpartyPrincipalEntityP3Nric: '',
                    counterpartyPrincipalEntityP3Nationality: '',
                    counterpartyPrincipalEntityP3IdType: 'NRIC',
                    counterpartyPrincipalEntityP3IdOthersDetail: '',

                    // Counterparty Principal Entity BOs (Form U4 page 2)
                    counterpartyPrincipalBo1Name: '',
                    counterpartyPrincipalBo1Nric: '',
                    counterpartyPrincipalBo1Dob: '',
                    counterpartyPrincipalBo1Address: '',
                    counterpartyPrincipalBo1Nationality: '',
                    counterpartyPrincipalBo1Occupation: '',
                    counterpartyPrincipalBo1IdType: 'NRIC',
                    counterpartyPrincipalBo1IdOthersDetail: '',
                    counterpartyPrincipalBo2Name: '',
                    counterpartyPrincipalBo2Nric: '',
                    counterpartyPrincipalBo2Dob: '',
                    counterpartyPrincipalBo2Address: '',
                    counterpartyPrincipalBo2Nationality: '',
                    counterpartyPrincipalBo2Occupation: '',
                    counterpartyPrincipalBo2IdType: 'NRIC',
                    counterpartyPrincipalBo2IdOthersDetail: '',
                },
                // Lazy initializer: try to restore a draft from sessionStorage
                // so a refresh / accidental nav-away doesn't wipe Step 1-5 inputs.
                // Merge with defaults so newly-added fields aren't undefined when
                // restoring an older draft (schema-drift safety).
                (defaults) => {
                    try {
                        const raw = window.sessionStorage && sessionStorage.getItem(DRAFT_STORAGE_KEY);
                        if (raw) {
                            const parsed = JSON.parse(raw);
                            if (parsed && typeof parsed === 'object') {
                                return { ...defaults, ...parsed };
                            }
                        }
                    } catch (e) {
                        console.warn('[draft] restore failed, using defaults:', e);
                    }
                    return defaults;
                }
            );

            // Persist every change to sessionStorage. Tab-scoped: closing the
            // browser tab automatically wipes the draft. Nothing leaves the device.
            React.useEffect(() => {
                try {
                    sessionStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(formData));
                } catch (e) {
                    // Storage full / disabled / private browsing — silently degrade.
                    console.warn('[draft] save failed:', e);
                }
            }, [formData]);

            // Clear the saved draft AND reset to a fresh wizard. We reload the page
            // because manually resetting every nested field is fragile; reload is
            // the simplest, most reliable reset. Confirm before destroying input.
            const clearDraft = () => {
                if (!window.confirm('Clear all entered data and start a fresh deal? This cannot be undone.')) return;
                try { sessionStorage.removeItem(DRAFT_STORAGE_KEY); } catch (e) {}
                window.location.reload();
            };

            const updateField = (field, value) => {
                setFormData({ type: 'SET_FIELD', field, value });
            };

            // Helper: update one key inside the nested formB object (Form B screening exceptions)
            const updateFormB = (key, value) => {
                setFormData({
                    type: 'SET_FIELD',
                    field: 'formB',
                    value: { ...formData.formB, [key]: value }
                });
            };

            // Helper: update one Section 1 / Section 2 answer at a given index
            const updateFormBAnswer = (section, idx, value) => {
                const arr = [...formData.formB[section]];
                arr[idx] = value;
                updateFormB(section, arr);
            };

            // Same helpers for formU5 (counterparty screening)
            const updateFormU5 = (key, value) => {
                setFormData({
                    type: 'SET_FIELD',
                    field: 'formU5',
                    value: { ...formData.formU5, [key]: value }
                });
            };
            const updateFormU5Answer = (section, idx, value) => {
                const arr = [...formData.formU5[section]];
                arr[idx] = value;
                updateFormU5(section, arr);
            };

            // Generic "update one key inside a nested form-state object" helper.
            // Used for formC / formU6 / formD where each form has its own sub-object.
            const updateNestedForm = (formKey, key, value) => {
                setFormData({
                    type: 'SET_FIELD',
                    field: formKey,
                    value: { ...(formData[formKey] || {}), [key]: value }
                });
            };

            // Toggle membership in a multi-select array (source of funds, source of
            // wealth, supporting docs, etc.). Adds the item if absent, removes if present.
            const toggleArrayItem = (formKey, arrayKey, item) => {
                const current = (formData[formKey] && formData[formKey][arrayKey]) || [];
                const next = current.includes(item) ? current.filter(x => x !== item) : [...current, item];
                updateNestedForm(formKey, arrayKey, next);
            };

            // Helper to render a multi-select checkbox group inline. Cleans up the JSX
            // for source-of-funds / source-of-wealth / supporting-docs pickers.
            const renderMultiSelect = (formKey, arrayKey, options) =>
                React.createElement('div', { className: 'space-y-2' },
                    options.map(opt =>
                        React.createElement(CheckboxField, {
                            key: opt.value,
                            label: opt.label,
                            checked: ((formData[formKey] && formData[formKey][arrayKey]) || []).includes(opt.value),
                            onChange: () => toggleArrayItem(formKey, arrayKey, opt.value)
                        })
                    )
                );

            const updateForm = (formName, checked) => {
                setFormData({
                    type: 'SET_FIELD',
                    field: 'selectedForms',
                    value: { ...formData.selectedForms, [formName]: checked }
                });
            };

            // =====================================================
            // INTELLIGENT AML FORM SELECTION (CDD Framework)
            // Based on Customer Due Diligence Guide
            // =====================================================
            const getAMLFormsNeeded = () => {
                const forms = [];

                // Only generate forms if client type is selected
                if (!formData.clientType) {
                    return forms;
                }

                // ===== SCENARIO 1: Individual Client (Direct) =====
                if (formData.clientType === 'Individual' && !formData.clientActingOnBehalf) {
                    forms.push(
                        { id: 'formA1', name: 'Form A1 (Client - Individual Particulars)' },
                        { id: 'formB', name: 'Form B (Client - Risk Assessment)' }
                    );
                }

                // ===== SCENARIO 2: Individual Acting on Behalf =====
                else if (formData.clientType === 'Individual' && formData.clientActingOnBehalf) {
                    forms.push(
                        { id: 'formA1', name: 'Form A1 (Client & Principal - Individual Particulars)' },
                        { id: 'formA3', name: 'Form A3 (Acting on Behalf - Authority Details)' },
                        { id: 'formB', name: 'Form B (Risk Assessment - Client & Principal)' }
                    );
                }

                // ===== SCENARIO 3: Entity/Company Client (Direct) =====
                else if (formData.clientType === 'Entity' && !formData.clientActingOnBehalf) {
                    forms.push(
                        { id: 'formA2', name: 'Form A2 (Entity - Company Particulars)' },
                        { id: 'formB', name: 'Form B (Risk Assessment - Entity)' }
                    );

                    // Add A4 and A1 for each beneficial owner
                    const numOwners = parseInt(formData.numberOfBeneficialOwners) || 1;
                    for (let i = 1; i <= numOwners; i++) {
                        forms.push(
                            { id: `formA4_owner${i}`, name: `Form A4 (Beneficial Owner ${i} of ${numOwners})` }
                        );
                    }
                    // A1 forms for beneficial owners
                    for (let i = 1; i <= numOwners; i++) {
                        forms.push(
                            { id: `formA1_owner${i}`, name: `Form A1 (Owner ${i} - Individual Particulars)` }
                        );
                    }
                }

                // ===== SCENARIO 4: Entity Acting on Behalf =====
                else if (formData.clientType === 'Entity' && formData.clientActingOnBehalf) {
                    forms.push(
                        { id: 'formA2', name: 'Form A2 (Agent Entity - Company Particulars)' },
                        { id: 'formA3', name: 'Form A3 (Acting on Behalf - Authority Details)' },
                        { id: 'formB', name: 'Form B (Risk Assessment - Agent Entity)' }
                    );

                    // Add A4 and A1 for each beneficial owner of agent entity
                    const numOwners = parseInt(formData.numberOfBeneficialOwners) || 1;
                    for (let i = 1; i <= numOwners; i++) {
                        forms.push(
                            { id: `formA4_agent${i}`, name: `Form A4 (Agent's Owner ${i} of ${numOwners})` }
                        );
                    }
                    for (let i = 1; i <= numOwners; i++) {
                        forms.push(
                            { id: `formA1_agent${i}`, name: `Form A1 (Agent's Owner ${i} - Individual)` }
                        );
                    }
                }

                // ===== COUNTERPARTY FORMS (Solo transactions only) =====
                // Counterparty form mapping (matches the actual CEA form titles):
                //   U1 = Individual particulars (parallel to A1)
                //   U2 = Entity particulars (parallel to A2/A4)
                //   U3 = Acting on behalf — individual (parallel to A3)
                //   U4 = Acting on behalf — entity (parallel to A4)
                //   U5 = Risk Determination & Screening Checklist (parallel to Form B)
                //   U6 = Enhanced Due Diligence (parallel to Form C)
                if (formData.cobroke === 'Solo' && formData.counterpartyType) {
                    // Helper: pick U3 (individual principal) or U4 (entity principal)
                    // based on what William chose in question 11.

                // Manual opt-in: Form D for periodic ongoing review

                // ===== ECDD AUTO-TRIGGER =====
                // If client screening (Form B) has any Yes flag, ECDD is required → add Form C.
                // Same for counterparty (Form U5 → Form U6).
                const formB = formData.formB || {};

            const getRequiredForms = () => {
                const forms = { mustSign: [], transaction: [], amlkyc: [], special: [] };

                if (!formData.transactionType || !formData.propertyType || !formData.role) {
                    return forms;

                if (formData.transactionType === 'RoomRental') {

                const isExclusive = formData.agencyType === 'Exclusive';

                if (isProp) {

                } else {

                if (formData.transactionType === 'Sale' || formData.transactionType === 'Purchase') {

                    forms.mustSign.push({

                if (formData.cobroke === 'Cobroke') {
                    const cobrokeRole = formData.role === 'Seller/Landlord'

                // Intelligent AML form selection based on CDD framework
                forms.amlkyc = getAMLFormsNeeded();

                if (formData.transactionType === 'Sale' || formData.transactionType === 'Purchase') {

            const validateStep = () => {
                if (step === 1) {

                if (step === 2) {

                    const soloValid = formData.cobroke !== 'Solo' || formData.counterpartyType;

                if (step === 3) {
                    return Object.values(formData.selectedForms).some(v => v === true);

                if (step === 4) {

                        formData.agentName &&

                    if (!formData.propertyCategory) return false;

                    if (formData.clientType === 'Individual') {

                    if (formData.clientType === 'Entity') {

                    if (formData.cobroke === 'Solo' && formData.counterpartyType === 'Individual') {
                        if (!formData.counterpartyName || !formData.counterpartyNRIC) return false;
                    }
                    return true;
                }
                return true;

            const handleNext = () => {

            const [generating, setGenerating] = React.useState(false);

                'commissionSharing': 'SRI Commission Sharing Agreement.docx',
            };

            // Fetch a template file from the co-hosted "realtor forms" folder
            const fetchTemplate = async (filename) => {
                const url = `./Realtor Forms/${encodeURIComponent(filename)}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`Could not load template: ${filename} (${resp.status})`);
                return await resp.arrayBuffer();
            };

            // Fill a .docx template by replacing underscore blanks in the XML
            // Templates use patterns like "Date : ___________" or "Name : ___________"
            // We find underscore runs in <w:t> elements and replace based on context
            // Convert a number to words (e.g., 2500000 → "Two Million Five Hundred Thousand")
            const numberToWords = (num) => {
                if (num === 0) return 'Zero';
                const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
                    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
                const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
                const scales = ['','Thousand','Million','Billion'];
                const toWords = (n) => {
                    if (n === 0) return '';
                    if (n < 20) return ones[n];
                    if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                    return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' ' + toWords(n % 100) : '');
                };
                const n = Math.abs(Math.floor(parseFloat(String(num).replace(/,/g, '')) || 0));
                if (n === 0) return 'Zero';
                const parts = [];
                let remaining = n;
                for (let i = 0; remaining > 0; i++) {
                    const chunk = remaining % 1000;
                    if (chunk > 0) parts.unshift(toWords(chunk) + (scales[i] ? ' ' + scales[i] : ''));
                    remaining = Math.floor(remaining / 1000);
                }
                return parts.join(' ');
            };

            // Format number with commas (e.g., 2500000 → "2,500,000")
            const formatPrice = (val) => {
                const n = parseFloat(String(val).replace(/,/g, '')) || 0;
                return n.toLocaleString('en-US');
            };

            const fillDocxTemplate = (arrayBuffer) => {
                console.log('[FILL] Starting fillDocxTemplate, buffer size:', arrayBuffer.byteLength);
                const zip = new PizZip(arrayBuffer);
                const xmlFile = zip.file('word/document.xml');
                if (!xmlFile) { console.warn('[FILL] No word/document.xml found!'); return zip; }

                let xml = xmlFile.asText();
                console.log('[FILL] XML length:', xml.length);
                const today = new Date().toLocaleDateString('en-SG');
                const priceInWords = numberToWords(formData.transactionPrice);
                const priceFormatted = formatPrice(formData.transactionPrice);

                // Commission handling.
                //   - If user typed a percentage (has "%", or plain number ≤ 100), treat it as a rate
                //     and auto-calculate the dollar amount from the transaction/rental price.
                //   - If user typed a big number (≥ 1000), treat it as the dollar amount directly.
                // Then every downstream pattern fills:
                //   "Singapore Dollars _______"  → AMOUNT IN WORDS + "Only"
                //   "(S$_______)"                → AMOUNT AS NUMBER with commas
                //   "rate of _______%"           → the rate number (e.g. "2")
                const commRaw     = String(formData.commissionRate || '').trim();
                const hasPercent  = /%/.test(commRaw);
                const commNum     = parseFloat(commRaw.replace(/[,%]/g, '').trim()) || 0;
                const priceNum    = parseFloat(String(formData.transactionPrice || '').replace(/,/g, '').trim()) || 0;
                // Rate detection: has explicit "%" OR is a small number (≤ 100)
                const isRate      = hasPercent || (commNum > 0 && commNum <= 100);
                let commissionAmount = 0;
                if (isRate && priceNum > 0) {
                    // 2% of $1,000,000 = $20,000
                    commissionAmount = Math.round((priceNum * commNum) / 100);
                } else if (!isRate) {
                    commissionAmount = commNum;
                }
                const commissionInWords    = commissionAmount > 0 ? (numberToWords(commissionAmount) + ' Only') : '';
                const commissionFormatted  = commissionAmount > 0 ? formatPrice(commissionAmount) : '';
                const commissionRateText   = isRate ? String(commNum) : '';

                const roleLabel = formData.role === 'Seller/Landlord'
                    ? (formData.transactionType === 'Rental' ? 'Landlord' : 'Seller')
                    : (formData.transactionType === 'Rental' ? 'Tenant' : 'Buyer');

                // Step 1: Extract all text content to build context for matching
                // We concatenate text from <w:t> tags to understand the document flow
                const textParts = [];
                const regex = /<w:t(?:\s[^>]*)?>([^<]*)<\/w:t>/g;
                let m;
                while ((m = regex.exec(xml)) !== null) {
                    textParts.push({ text: m[1], index: m.index, fullMatch: m[0], captureStart: m.index + m[0].indexOf(m[1]) });
                }

                // Step 2: Build a flat text string and track positions back to XML
                let flatText = '';
                const posMap = []; // maps flat text position → textParts index
                for (let i = 0; i < textParts.length; i++) {
                    const start = flatText.length;
                    flatText += textParts[i].text;
                    for (let j = 0; j < textParts[i].text.length; j++) {
                        posMap.push(i);
                    }
                }

                // Step 3: Define context-based replacement rules
                // Each rule: regex to find in the flat text, capture group 1 = underscores to replace
                // Rules are applied in order; each rule matches at most once.
                // For CEA forms (Forms 1-8), fields look like "Seller (1) Name: ___"
                // For Commission Agreements, fields look like "Name : ___________________"
                const replacements = [
                    // === DATE FIELDS ===
                    { pattern: /Date\s*:?\s*(_{3,})/, value: today },
                    { pattern: /dated this\s*(_{3,})/, value: today },
                    { pattern: /Agreement Date\/(_{3,})/, value: today },

                    // === AGENT / SALESPERSON ===
                    { pattern: /Salesperson[\s\S]{0,30}?Name\s*:?\s*(_{3,})/, value: formData.agentName },
                    { pattern: /CEA Reg\.?\s*No\.?\s*:?\s*(_{3,})/, value: formData.ceaRegistration },
                    { pattern: /Registration No\.?\s*:?\s*(_{3,})/, value: formData.ceaRegistration },
                    // Cobroke agreement: first "Name: ___" after "representing Seller/Buyer(s)"
                    { pattern: /representing\s+(?:Seller|Buyer|Landlord|Tenant)\(s\)Name\s*:\s*(_{3,})/, value: formData.agentName },
                    // Cobroke: first "CEA No.: ___" (before the second one)
                    { pattern: /CEA No\.\s*:\s*(_{3,})\s*CEA No\./, value: formData.ceaRegistration },
                    // Cobroke: first "Mobile: ___" (before the second one)
                    { pattern: /Mobile\s*:\s*(_{3,})\s*Mobile/, value: formData.agentContact },

                    // === CLIENT NAME ===
                    // Commission Agreement style: "To : ___ (Billing Name)"
                    { pattern: /To\s*:?\s*(_{3,})[\s\S]{0,20}?\(?Billing Name\)?/, value: formData.clientName },
                    // CEA form style: "Seller (1) Name: ___" or "Buyer (1) Name: ___"
                    { pattern: /(?:Seller|Buyer|Landlord|Tenant)\s*\(1\)\s*Name\s*:?\s*(_{3,})/, value: formData.clientName },
                    // Generic "I/We" pattern
                    { pattern: /I\/We,?\s*(_{3,})/, value: formData.clientName },

                    // === CLIENT ADDRESS ===
                    // Commission Agreement: after (Billing Name) line
                    { pattern: /\(Billing Name\)[\s\S]{0,5}?(_{3,})[\s\S]{0,20}?\(?Billing Address\)?/, value: formData.clientAddress },
                    // CEA form: "Address: ___" right after NRIC line
                    { pattern: /NRIC\s*No\.?\s*\(\d\)\s*:[\s\S]{0,30}?Address\s*:?\s*(_{3,})/, value: formData.clientAddress },

                    // === PROPERTY ADDRESS ===
                    // Commission Agreement style
                    { pattern: /Property Address\s*:?\s*(_{3,})/, value: formData.propertyAddress },
                    // CEA form style: "basis(7)(8):___"
                    { pattern: /basis[\s\S]{0,15}:\s*(_{3,})/, value: formData.propertyAddress },

                    // === PRICE / AMOUNT ===
                    { pattern: /\(\$\s*(_{3,})\)/, value: formData.transactionPrice ? priceFormatted : '' },
                    { pattern: /\(S\$\s*(_{3,})\s*\)/, value: formData.transactionPrice ? priceFormatted : '' },
                    { pattern: /Singapore Dollars\s*(_{3,})/, value: formData.transactionPrice ? priceInWords : '' },
                    { pattern: /sale price[\s\S]{0,30}?Singapore Dollars\s*(_{3,})/, value: formData.transactionPrice ? priceInWords : '' },
                    { pattern: /Monthly Rent\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Purchase Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Option Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },
                    { pattern: /Sale Price\s*:?\s*(_{3,})/, value: formData.transactionPrice ? 'S$' + formData.transactionPrice : '' },

                    // === COMMISSION ===
                    // "commission of Singapore Dollars _______" → AMOUNT IN WORDS (e.g. "Twenty Thousand Only")
                    { pattern: /commission\s+of\s+Singapore\s+Dollars\s*(_{3,})/, value: commissionInWords },
                    // "(S$_______)" bracket that follows the words — the NUMBER
                    { pattern: /\(\s*S\$\s*(_{3,})\s*\)/, value: commissionFormatted },
                    // "commission of S$______" when the template uses $ directly
                    { pattern: /commission\s+of\s+\*?S\$\s*(_{3,})/, value: commissionFormatted },
                    // Percentage rate ("rate of ___%") — just the rate number (e.g. "2")
                    { pattern: /rate\s+of\s+(_{3,})%/, value: commissionRateText || formData.commissionRate || '' },
                    // Generic fallback ("commission: ___") — prefer dollar amount
                    { pattern: /commission\s*:?\s*(_{3,})/, value: commissionFormatted || commissionRateText || formData.commissionRate || '' },

                    // === NRIC ===
                    // CEA form style with footnote: "NRIC No.(4): ___"
                    { pattern: /NRIC\s*No\.?\s*\(\d\)\s*:?\s*(_{3,})/, value: formData.clientNRIC },
                    // Commission Agreement style
                    { pattern: /NRIC\s*(?:No\.?)?\s*:?\s*(_{3,})/, value: formData.clientNRIC },
                    { pattern: /Passport\s*(?:No\.?)?\s*:?\s*(_{3,})/, value: formData.clientNRIC },

                    // === LEASE DATES ===
                    { pattern: /Commencement\s*(?:Date)?\s*:?\s*(_{3,})/, value: formData.leaseStartDate || '' },
                    { pattern: /(?:Lease\s+)?Start\s*Date\s*:?\s*(_{3,})/, value: formData.leaseStartDate || '' },
                    { pattern: /(?:Lease\s+)?End\s*Date\s*:?\s*(_{3,})/, value: formData.leaseEndDate || '' },
                    { pattern: /Expiry\s*(?:Date)?\s*:?\s*(_{3,})/, value: formData.leaseEndDate || '' },
                    // CEA form: "expire on ___"
                    { pattern: /expire\s+on\s+(_{3,})/, value: formData.leaseEndDate || '' },

                    // === SECURITY DEPOSIT ===
                    { pattern: /Security\s+Deposit\s*:?\s*(_{3,})/, value: formData.securityDeposit ? 'S$' + formData.securityDeposit : '' },

                    // === OTHER CLIENT DETAILS ===
                    { pattern: /Nationality\s*:?\s*(_{3,})/, value: formData.clientNationality || '' },
                    { pattern: /Date\s+of\s+Birth\s*:?\s*(_{3,})/, value: formData.clientDOB || '' },
                    { pattern: /Occupation\s*:?\s*(_{3,})/, value: formData.clientOccupation || '' },
                    { pattern: /(?:Contact|Tel|Phone|Hp|Mobile)\s*(?:No\.?)?\s*:?\s*(_{3,})/, value: formData.clientContact || '' },

                    // === COUNTERPARTY ===
                    { pattern: /Counterparty[\s\S]{0,30}?Name\s*:?\s*(_{3,})/, value: formData.counterpartyName || '' },

                    // === CO-BROKE AGENT (paired fields in Cobroke Agreement) ===
                    // Cobroke agreements have paired columns: SRI agent (left) | Co-broke agent (right)
                    // Pattern: "Name: ___   Name: ___" — first = SRI, second = cobroke
                    // SRI agent side (first occurrence, already matched by Salesperson Name rule above)
                    // Co-broke agent side (second occurrence — match by looking by the pair)
                    { pattern: /Name\s*:\s*_{3,}\s+Name\s*:\s*(_{3,})/, value: formData.cobrokeAgentName || '' },
                    { pattern: /CEA No\.\s*:\s*_{3,}\s*CEA No\.\s*:\s*(_{3,})/, value: formData.cobrokeAgentCEA || '' },
                    { pattern: /Mobile\s*:\s*_{3,}\s*Mobile\s*:\s*(_{3,})/, value: formData.cobrokeAgentMobile || '' },

                    // === AML/KYC FORMS (Form A1-A4, B, C, D, U1-U5) - Generic field patterns ===
                    // These forms have simple "Field: ___________" format without role prefixes
                    // FIXED: Removed ^ anchor (which required newlines that don't exist in concatenated text)
                    // Order matters: more specific patterns first (Full Name before Name, Client Name before Name)
                    { pattern: /Full Name:\s*(_{3,})/, value: formData.clientName },
                    { pattern: /Client Name:\s*(_{3,})/, value: formData.clientName },
                    { pattern: /Entity Name:\s*(_{3,})/, value: formData.entityName || formData.clientName },
                    { pattern: /Estate Agent Name:\s*(_{3,})/, value: formData.agentName },
                    { pattern: /RES Name:\s*(_{3,})/, value: formData.agentName },
                    { pattern: /Company:\s*(_{3,})/, value: formData.entityName || formData.clientName },
                    { pattern: /Name:\s*(_{3,})/, value: formData.clientName },
                    { pattern: /Address:\s*(_{3,})/, value: formData.clientAddress },
                    { pattern: /Date:\s*(_{3,})/, value: today },
                    { pattern: /NRIC No\.?:\s*(_{3,})/, value: formData.clientNRIC },
                    { pattern: /Passport No\.?:\s*(_{3,})/, value: formData.clientNRIC },
                    { pattern: /Email:\s*(_{3,})/, value: formData.clientEmail || '' },
                    { pattern: /Contact No\.?:\s*(_{3,})/, value: formData.clientContact || '' },
                    { pattern: /Phone:\s*(_{3,})/, value: formData.clientContact || '' },
                    { pattern: /Occupation:\s*(_{3,})/, value: formData.clientOccupation || '' },
                    { pattern: /Nationality:\s*(_{3,})/, value: formData.clientNationality || '' },
                ];

                // Step 4: Apply replacements on the flat text, then map back to XML
                // We collect all underscore ranges that need replacing
                const xmlReplacements = []; // { partIndex, startInPart, endInPart, value }

                console.log('[FILL] Flat text length:', flatText.length, 'textParts count:', textParts.length);
                console.log('[FILL] First 500 chars of flat text:', flatText.substring(0, 500));

                const claimedParts = new Set(); // track which textParts have already been replaced
                for (const rule of replacements) {
                    if (!rule.value) continue;
                    const match = rule.pattern.exec(flatText);
                    if (!match || !match[1]) continue;

                    // Find where the underscore capture group is in flat text
                    const underscoreStart = match.index + match[0].indexOf(match[1]);
                    const underscoreEnd = underscoreStart + match[1].length;

                    // Map back to textParts
                    const startPartIdx = posMap[underscoreStart];
                    const endPartIdx = posMap[underscoreEnd - 1];

                    // Skip if any part in this range was already claimed by a previous rule
                    let overlap = false;
                    for (let i = startPartIdx; i <= endPartIdx; i++) {
                        if (claimedParts.has(i)) { overlap = true; break; }
                    }
                    if (overlap) {
                        console.log('[FILL] SKIPPED (overlap):', rule.pattern.toString());
                        continue;
                    }

                    console.log('[FILL] MATCHED:', rule.pattern.toString(), '→', rule.value);

                    if (startPartIdx === endPartIdx) {
                        // Underscores are within a single <w:t> element — simple case
                        let charsBefore = 0;
                        for (let i = 0; i < startPartIdx; i++) charsBefore += textParts[i].text.length;
                        const inPartStart = underscoreStart - charsBefore;
                        const inPartEnd = underscoreEnd - charsBefore;
                        xmlReplacements.push({ partIndex: startPartIdx, inPartStart, inPartEnd, value: rule.value });
                        claimedParts.add(startPartIdx);
                    } else {
                        // Underscores span multiple <w:t> elements
                        // Replace first part's underscores with value, clear rest
                        let charsBefore = 0;
                        for (let i = 0; i < startPartIdx; i++) charsBefore += textParts[i].text.length;
                        const inPartStart = underscoreStart - charsBefore;
                        xmlReplacements.push({
                            partIndex: startPartIdx,
                            inPartStart,
                            inPartEnd: textParts[startPartIdx].text.length,
                            value: rule.value
                        });
                        // Clear intermediate parts
                        for (let i = startPartIdx + 1; i <= endPartIdx; i++) {
                            let cBefore = 0;
                            for (let j = 0; j < i; j++) cBefore += textParts[j].text.length;
                            const end = (i === endPartIdx) ? (underscoreEnd - cBefore) : textParts[i].text.length;
                            xmlReplacements.push({ partIndex: i, inPartStart: 0, inPartEnd: end, value: '' });
                        }
                        // Claim all parts in range
                        for (let i = startPartIdx; i <= endPartIdx; i++) claimedParts.add(i);
                    }

                    // Extend: clear any trailing underscore-only <w:t> elements beyond the matched range
                    const lastClaimed = (startPartIdx === endPartIdx) ? startPartIdx : endPartIdx;
                    for (let i = lastClaimed + 1; i < textParts.length; i++) {
                        if (/^[_ ]+$/.test(textParts[i].text) && textParts[i].text.includes('_') && !claimedParts.has(i)) {
                            xmlReplacements.push({ partIndex: i, inPartStart: 0, inPartEnd: textParts[i].text.length, value: '' });
                            claimedParts.add(i);
                        } else {

                        }
                    }
                }

                // Step 5: Apply XML replacements (process in reverse order to preserve positions)
                xmlReplacements.sort((a, b) => {
                    if (a.partIndex !== b.partIndex) return b.partIndex - a.partIndex;
                    return b.inPartStart - a.inPartStart;
                });

                for (const rep of xmlReplacements) {
                    const part = textParts[rep.partIndex];
                    const rawPrefix = part.text.substring(0, rep.inPartStart);
                    const rawSuffix = part.text.substring(rep.inPartEnd);
                    // Strip trailing underscores from prefix and leading underscores from suffix
                    const prefix = rawPrefix.replace(/_+\s*$/, '');
                    const suffix = rawSuffix.replace(/^_+\s*/, '');

                    if (rep.value) {
                        // Split the <w:r> run so formatting (ALL CAPS + size 10 + bold + underline)
                        // is applied ONLY to the filled value, not surrounding text.
                        // William's rule: every value dropped into a .docx must be:
                        //   ALL CAPS + Font size 10 + Bold + Underlined
                        const searchStart = Math.max(0, part.index - 500);
                        const before = xml.substring(searchStart, part.index);
                        const rOpenIdx = Math.max(before.lastIndexOf('<w:r>'), before.lastIndexOf('<w:r '));

                        let originalRPr = '';
                        // Size is half-points in OOXML: 20 = 10pt
                        let buRPr = '<w:rPr><w:b/><w:u w:val="single"/><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr>';

                        if (rOpenIdx >= 0) {
                            const absROpen = searchStart + rOpenIdx;
                            const rTagEnd = xml.indexOf('>', absROpen) + 1;
                            const gap = xml.substring(rTagEnd, part.index);
                            const rPrMatch = gap.match(/<w:rPr>([\s\S]*?)<\/w:rPr>/);
                            if (rPrMatch) {
                                originalRPr = rPrMatch[0];
                                // Start fresh rather than inherit original (which may have its own size).
                                // Always force bold + underline + size 10.
                                let rPrContent = rPrMatch[1]
                                    .replace(/<w:sz[^/>]*\/>/g, '')
                                    .replace(/<w:szCs[^/>]*\/>/g, '')
                                    .replace(/<w:b\s*\/>/g, '')
                                    .replace(/<w:u[^/>]*\/>/g, '');
                                buRPr = '<w:rPr>' + rPrContent +

                                        '</w:rPr>';
                            }
                        }

                        // Force ALL CAPS on the inserted value
                        const valueUpper = String(rep.value).toUpperCase();

                        // Create 3 runs: prefix (closes original) | value (formatted) | suffix (plain)
                        const newTag = `<w:t xml:space="preserve">${prefix}</w:t></w:r>` +
                                       `<w:r>${buRPr}<w:t xml:space="preserve">${valueUpper}</w:t></w:r>` +
                                       `<w:r><w:rPr></w:rPr><w:t xml:space="preserve">${suffix}</w:t>`;
                        xml = xml.substring(0, part.index) + newTag + xml.substring(part.index + part.fullMatch.length);
                    } else {
                        // Empty replacement — clearing intermediate/trailing underscore parts
                        const cleanText = (prefix + suffix).replace(/_+/g, '');
                        const newTag = `<w:t xml:space="preserve">${cleanText}</w:t>`;
                        xml = xml.substring(0, part.index) + newTag + xml.substring(part.index + part.fullMatch.length);
                    }
                }

                console.log('[FILL] Total replacements applied:', xmlReplacements.length);

                // Step 6: Handle special non-underscore blanks
                // Cobroke Agreement: agency name uses spaces instead of underscores
                // Pattern in XML: "M/s" followed by a <w:t> with lots of spaces, then "(hereinafter"
                if (formData.cobrokeAgentAgency) {
                    // Find <w:t> elements that are just long runs of spaces (agency blank)
                    const spaceRegex = /<w:t xml:space="preserve">([ ]{20,})<\/w:t>/g;
                    let spaceMatch;
                    let replaced = false;
                    while ((spaceMatch = spaceRegex.exec(xml)) !== null) {
                        // Check if "M/s" appears within 200 chars before this match
                        const before = xml.substring(Math.max(0, spaceMatch.index - 200), spaceMatch.index);
                        if (before.includes('M/s') && !replaced) {
                            // Split run: close original, new run with bold+underline for value
                            const srchStart = Math.max(0, spaceMatch.index - 500);
                            const bfr = xml.substring(srchStart, spaceMatch.index);
                            const rIdx = Math.max(bfr.lastIndexOf('<w:r>'), bfr.lastIndexOf('<w:r '));
                            let origRP = '';
                            let buRP = '<w:rPr><w:b/><w:u w:val="single"/><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr>';
                            if (rIdx >= 0) {
                                const absR = srchStart + rIdx;
                                const rEnd = xml.indexOf('>', absR) + 1;
                                const gap = xml.substring(rEnd, spaceMatch.index);
                                const prM = gap.match(/<w:rPr>([\s\S]*?)<\/w:rPr>/);
                                if (prM) {
                                    origRP = prM[0];
                                    let rpClean = prM[1]
                                        .replace(/<w:sz[^/>]*\/>/g, '')
                                        .replace(/<w:szCs[^/>]*\/>/g, '')
                                        .replace(/<w:b\s*\/>/g, '')
                                        .replace(/<w:u[^/>]*\/>/g, '');
                                    buRP = '<w:rPr>' + rpClean +
                                           '<w:b/><w:u w:val="single"/><w:sz w:val="20"/><w:szCs w:val="20"/>' +
                                           '</w:rPr>';
                                }
                            }
                            const agencyUpper = String(formData.cobrokeAgentAgency || '').toUpperCase();
                            const newTag = `<w:t xml:space="preserve"></w:t></w:r>` +
                                           `<w:r>${buRP}<w:t xml:space="preserve">${agencyUpper}</w:t></w:r>` +
                                           `<w:r>${origRP}<w:t xml:space="preserve"></w:t>`;
                            xml = xml.substring(0, spaceMatch.index) + newTag + xml.substring(spaceMatch.index + spaceMatch[0].length);
                            replaced = true;
                            console.log('[FILL] Replaced cobroke agency blank space with:', formData.cobrokeAgentAgency);
                        }
                    }
                }

                zip.file('word/document.xml', xml);
                return zip;
            };

            // PDF Filling Function for AML Forms — PURE OVERLAY
            // We IGNORE the PDF's internal form field names (they're unreliable —
            // e.g. a field named "Nationality Occupation" sits next to the
            // "Occupation:" label). Instead we:
            //   1) Strip all interactive form field annotations so nothing
            //      floats on top of what we draw.
            //   2) Draw text and X marks at the exact page coordinates defined
            //      in aml-pdf-coords.js (AML_FORM_COORDS).
            //
            // This mirrors the approach used by the realtor-paperwork skill
            // with reportlab + pypdf.
            const fillPdfTemplate = async (arrayBuffer, formId) => {
                try {
                    if (!window.PDFLib) {
                        console.warn('[PDF] pdf-lib not loaded, returning template as-is');
                        return new Uint8Array(arrayBuffer);
                    }

                    // Strip suffixes like "_owner1" to get the base form id
                    const baseFormId = (formId || '').replace(/_.*$/, '');
                    const coords = (window.AML_FORM_COORDS || {})[baseFormId];

                    if (!coords) {
                        console.warn('[PDF] No coordinates defined for', formId, '— returning template as-is');
                        return new Uint8Array(arrayBuffer);
                    }

                    console.log('[PDF] Filling', formId, 'using coords for', baseFormId);

                    const { PDFDocument, StandardFonts, PDFName } = window.PDFLib;
                    const pdfDoc = await PDFDocument.load(arrayBuffer);
                    const font     = await pdfDoc.embedFont(StandardFonts.Helvetica);
                    const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

                    const data = window.buildAmlFieldData(formData, formId);
                    const pages = pdfDoc.getPages();

                    // ── Step 1: Strip form field annotations from each page ──
                    // The PDF's own form field overlays (empty text boxes,
                    // checkbox outlines) would otherwise cover our overlays.
                    // The static labels/lines/box graphics remain because they
                    // live in the page content stream, not the annotations.
                    try {
                        for (const page of pages) {
                            page.node.delete(PDFName.of('Annots'));
                        }
                    } catch (e) {
                        console.warn('[PDF] Could not strip annotations cleanly:', e);
                    }

                    // Helper: convert ISO dates (YYYY-MM-DD from <input type=date>)
                    // into DD/MM/YYYY before drawing.
                    const formatDate = (v) => {
                        if (!v || typeof v !== 'string') return v;
                        const m = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                        if (m) return `${m[3]}/${m[2]}/${m[1]}`;
                        return v;
                    };

                    // ── Step 2: Draw text at each mapped coordinate ──
                    for (const pageIdxStr of Object.keys(coords.text || {})) {
                        const pageIdx = parseInt(pageIdxStr, 10) - 1;
                        const page = pages[pageIdx];
                        if (!page) continue;
                        for (const field of coords.text[pageIdxStr]) {
                            let value = window.amlGetValue(data, field.key);
                            if (value === undefined || value === null || value === '' || value === false) continue;
                            value = formatDate(value);
                            try {
                                const fontSize = field.size || 10;
                                const drawOpts = {
                                    x: field.x,
                                    y: field.y,
                                    size: fontSize,
                                    font: font
                                };

                                // pdf-lib auto-wraps and stacks lines downward from y.
                                if (field.maxWidth) {
                                    drawOpts.maxWidth = field.maxWidth;
                                    drawOpts.lineHeight = field.lineHeight || (fontSize + 1);
                                }
                                page.drawText(String(value).toUpperCase(), drawOpts);
                            } catch (e) {
                                console.warn('[PDF] drawText failed for', field.key, e);
                            }
                        }
                    }

                    for (const pageIdxStr of Object.keys(coords.checkboxes || {})) {
                        const pageIdx = parseInt(pageIdxStr, 10) - 1;
                        const page = pages[pageIdx];
                        if (!page) continue;
                        for (const box of coords.checkboxes[pageIdxStr]) {
                            const value = window.amlGetValue(data, box.key);
                            let shouldTick;
                            if (box.match !== undefined) {
                                // Arrays support multi-select tick patterns (e.g. source-of-funds
                                // checkbox lists where several can be ticked at once).
                                if (Array.isArray(value)) shouldTick = value.includes(box.match);
                                else                       shouldTick = (value === box.match);
                            } else {
                                shouldTick = Boolean(value);
                            }
                            if (!shouldTick) continue;
                            try {
                                page.drawText('X', {
                                    x: box.x - 2,
                                    y: box.y - 3,
                                    size: 8,
                                    font: boldFont
                                });
                            } catch (e) {
                                console.warn('[PDF] checkbox X failed for', box.key, e);
                            }
                        }
                    }

                    const filledBytes = await pdfDoc.save();
                    console.log('[PDF] Filled', formId, '- size:', filledBytes.byteLength);
                    return filledBytes;

                } catch (err) {
                    console.error('[PDF] fillPdfTemplate error:', err);
                    // Fall back to un-filled template so user still gets something
                    return new Uint8Array(arrayBuffer);
                }

                        if (!templateFilename) {
                            console.warn(`No template mapped for form: ${formId}`);
                            continue;

                        setGenStatus(`Processing ${formInfo.name}... (${completed + 1}/${selectedIds.length})`);

                            const templateData = await fetchTemplate(templateFilename);
                            const ext = templateFilename.split('.').pop().toLowerCase();
                            const safeName = formInfo.name.replace(/[^a-zA-Z0-9() .-]/g, '').trim();

                                const blob = new Blob([filledData], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });

                    setTimeout(() => {

            return React.createElement('div', { className: 'min-h-screen bg-white' },

                            React.createElement('span', { className: 'text-lg leading-none' }, '\ud83d\udd12'),

                                'Click the button below to download all selected forms using the original SRI templates, pre-filled with the details above.'
                            )
                        ),
                        genStatus && React.createElement('div', { className: 'mt-4 p-3 bg-purple-50 border border-purple-200 rounded-lg' },
                            React.createElement('p', { className: 'text-sm text-purple-800' }, genStatus)
                        )
                    ),

                    React.createElement('div', { className: 'flex justify-between mt-12 pt-8 border-t border-gray-200' },
                        React.createElement('button', {
                            onClick: handleBack,
                            disabled: step === 1,
                            className: `px-6 py-3 rounded-lg font-semibold transition-colors ${step === 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-200 text-gray-800 hover:bg-gray-300'}`
                        }, 'Back'),
                        React.createElement('button', {
                            onClick: () => {
                                if (step === 6) {
                                    downloadDocuments();
                                } else {
                                    handleNext();
                                }
                            },
                            disabled: !validateStep() || generating,
                            className: `px-6 py-3 rounded-lg font-semibold transition-colors ${(!validateStep() || generating) ? 'opacity-50 cursor-not-allowed' : 'hover:opacity-90'}`,
                            style: {
                                backgroundColor: (validateStep() && !generating) ? '#5B2D8E' : '#D1D5DB',
                                color: 'white'
                            }
                        }, step === 6 ? (generating ? 'Generating...' : 'Download All Documents') : 'Next')
                    ),

                    !validateStep() && React.createElement('div', { className: 'mt-4 p-4 bg-red-50 border border-red-200 rounded-lg' },
                        React.createElement('p', { className: 'text-sm text-red-800' }, 'Please complete all required fields before proceeding.')
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(SRIPaperworkApp));
    </script>
</body>
</html>
